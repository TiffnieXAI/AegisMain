<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wallet Users</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style: none;
            padding-left: 0;
        }
        li {
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<h1>Wallet Users</h1>
<button onclick="loadWallets()">Load Wallet Users</button>
<ul id="walletList"></ul>

<script>
async function loadWallets() {
    try {
        const response = await fetch("http://127.0.0.1:8000/wallets/");
        if (!response.ok) {
            throw new Error("Network response was not ok");
        }

        const wallets = await response.json();

        const list = document.getElementById("walletList");
        list.innerHTML = ""; // Clear previous entries

        if(wallets.length === 0){
            const li = document.createElement("li");
            li.textContent = "No wallet users found.";
            list.appendChild(li);
            return;
        }

        wallets.forEach(wallet => {
            const li = document.createElement("li");
            li.textContent = `Wallet Address: ${wallet.wallet_address} | Created: ${wallet.created_timestamp || "N/A"} | Last Login: ${wallet.last_login || "N/A"}`;
            list.appendChild(li);
        });
    } catch (error) {
        console.error("Error fetching wallet users:", error);
    }
}

// Optional: automatically load wallet users on page load
window.onload = loadWallets;
</script>

</body>
</html>
