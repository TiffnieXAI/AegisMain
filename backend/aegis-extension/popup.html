<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <title>A.E.G.I.S. Transaction Guard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .popup-card {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .popup-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
        }

        .logo-section { display:flex; align-items:center; gap:10px; }
        .logo-text h2 { font-size:15px; font-weight:700; color:#e2e8f0; letter-spacing:.5px; }
        .logo-text p  { font-size:10px; color:#64748b; }

        .close-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            width: 28px; height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items:center; justify-content:center;
        }
        .close-btn:hover { background: rgba(255,255,255,0.05); color:#e2e8f0; }

        .popup-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .tx-label {
            font-size: 9px;
            letter-spacing: 1.5px;
            color: #4f46e5;
            font-weight: 700;
        }

        .tx-title {
            font-size: 15px;
            font-weight: 600;
            color: #e2e8f0;
            margin: 6px 0 14px;
            line-height: 1.4;
        }

        .address-section {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .address-label { color:#64748b; min-width:48px; }
        .address-value { font-family: monospace; font-size:11px; flex:1; }

        .copy-btn {
            background:transparent; border:none; color:#64748b;
            cursor:pointer; padding:2px 4px; border-radius:4px;
            font-size:13px;
        }
        .copy-btn:hover { color:#e2e8f0; }

        .risk-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-radius: 10px;
            margin: 14px 0;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .risk-level-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .5px;
            margin-top: 4px;
        }

        .risk-score {
            font-size: 28px;
            font-weight: 800;
        }

        .risk-score-max { font-size:13px; color:#64748b; font-weight:400; }

        .datetime-section {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 14px;
        }
        .datetime-item { display:flex; align-items:center; gap:5px; }

        .gas-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .gas-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .gas-label { font-size:10px; color:#64748b; text-transform:uppercase; letter-spacing:.5px; }
        .gas-value { display:flex; align-items:baseline; gap:4px; margin-top:4px; }
        .gas-number { font-size:18px; font-weight:700; color:#e2e8f0; }
        .gas-unit   { font-size:11px; color:#64748b; }

        .metrics-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .metric-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            padding: 12px 14px;
        }

        .metric-header {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .metric-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .metric-percentage { font-size:20px; font-weight:700; color:#e2e8f0; }

        .metric-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .progress-bar-bg {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width .5s ease;
        }

        .analysis-section {
            background: rgba(79,70,229,0.08);
            border: 1px solid rgba(79,70,229,0.2);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .analysis-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: #818cf8;
            font-size: 13px;
            font-weight: 600;
        }

        .analysis-text { font-size:12px; color:#94a3b8; line-height:1.6; }

        .recom-section {
            background: rgba(6,182,212,0.07);
            border: 1px solid rgba(6,182,212,0.2);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 14px;
        }

        .recom-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            color: #22d3ee;
            font-size: 13px;
            font-weight: 600;
        }

        .recom-text { font-size:12px; color:#94a3b8; line-height:1.6; }

        .warnings-section {
            background: rgba(249,115,22,0.06);
            border: 1px solid rgba(249,115,22,0.2);
            border-radius: 10px;
            margin-bottom: 14px;
            overflow: hidden;
        }

        .warnings-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 14px;
            cursor: pointer;
            color: #fb923c;
            font-size: 13px;
            font-weight: 600;
        }

        .warnings-header .collapse-icon {
            margin-left: auto;
            transition: transform .2s;
        }

        .warnings-content { padding: 0 14px 12px; }
        .warnings-content.collapsed { display:none; }

        .warnings-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .warnings-list li {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .warnings-list li::before {
            content: '⚠';
            color: #fb923c;
            font-size: 11px;
            margin-top: 1px;
            flex-shrink: 0;
        }

        .risk-acknowledgment {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            margin-bottom: 14px;
            cursor: pointer;
        }

        .risk-acknowledgment input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-top: 2px;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #4f46e5;
        }

        .risk-acknowledgment label {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
            cursor: pointer;
        }

        .risk-acknowledgment label strong {
            display: block;
            color: #f87171;
            margin-bottom: 2px;
            font-size: 12px;
        }

        .popup-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.2);
            position: sticky;
            bottom: 0;
        }

        .reject-btn {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(239,68,68,0.4);
            background: rgba(239,68,68,0.08);
            color: #f87171;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }
        .reject-btn:hover { background: rgba(239,68,68,0.18); }

        .accept-btn {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(79,70,229,0.3);
            background: rgba(79,70,229,0.1);
            color: #818cf8;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            opacity: 0.5;
        }
        .accept-btn.active {
            opacity: 1;
            background: rgba(79,70,229,0.2);
            border-color: rgba(79,70,229,0.6);
        }
        .accept-btn.active:hover {
            background: rgba(79,70,229,0.35);
        }
        .accept-btn:disabled { cursor: not-allowed; }

        /* Confirmation overlays */
        .confirm-modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex; align-items:center; justify-content:center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .confirm-modal {
            background: #1e293b;
            border-radius: 16px;
            padding: 28px 24px;
            width: 300px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .confirm-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: flex; align-items:center; justify-content:center;
            font-size: 20px;
            margin: 0 auto 16px;
            font-weight: 700;
        }

        .confirm-modal.reject .confirm-icon { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.3); }
        .confirm-modal.accept .confirm-icon { background:rgba(79,70,229,0.1); color:#818cf8; border:1px solid rgba(79,70,229,0.3); }

        .confirm-modal h3 { font-size:16px; font-weight:700; color:#e2e8f0; margin-bottom:10px; }
        .confirm-modal p  { font-size:13px; color:#94a3b8; line-height:1.5; margin-bottom:20px; }

        .confirm-actions { display:flex; gap:10px; }

        .confirm-cancel {
            flex:1; padding:10px;
            border-radius:8px;
            border:1px solid rgba(255,255,255,0.1);
            background:transparent; color:#94a3b8;
            cursor:pointer; font-size:13px;
        }
        .confirm-cancel:hover { background:rgba(255,255,255,0.05); }

        .confirm-reject {
            flex:1; padding:10px;
            border-radius:8px;
            border:1px solid rgba(239,68,68,0.4);
            background:rgba(239,68,68,0.1); color:#f87171;
            cursor:pointer; font-size:13px; font-weight:600;
        }
        .confirm-reject:hover { background:rgba(239,68,68,0.2); }

        .confirm-accept {
            flex:1; padding:10px;
            border-radius:8px;
            border:1px solid rgba(79,70,229,0.4);
            background:rgba(79,70,229,0.15); color:#818cf8;
            cursor:pointer; font-size:13px; font-weight:600;
        }
        .confirm-accept:hover { background:rgba(79,70,229,0.3); }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 16px;
            color: #64748b;
            font-size: 14px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            width: 32px; height: 32px;
            border: 2px solid rgba(79,70,229,0.2);
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-state">
            <div class="spinner"></div>
            <span>Analyzing transaction...</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
